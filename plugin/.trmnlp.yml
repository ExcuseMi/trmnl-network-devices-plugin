# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields: {}

# override variables
variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "Network Devices v1.3"
      strategy: webhook
      dark_mode: "no"
      no_screen_padding: "no"
      polling_headers: ""
      polling_url: ""
      custom_fields_values:
        show_ports: "yes"
        port_labels: ""
        port_display_mode: both
        device_identifiers: ""
        show_mac_addresses: "no"
        show_offline_devices: "yes"
  devices_list:
    - "192.168.1.1|router.local|AA:BB:CC:DD:EE:01|TP-Link|Router|1700000000|80,443,9000"
